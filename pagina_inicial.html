<!DOCTYPE html>
<html>
<head>
    <title>Gráfico em Tempo Real</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <canvas id="myChart" width="400" height="200"></canvas>
   <canvas id="wind-direction-chart"></canvas>
    <script>
        var ctx = document.getElementById('myChart').getContext('2d');
        var chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [], // Rotular os pontos do gráfico (tempo, por exemplo)
                datasets: [{
                    label: 'Dados em Tempo Real',
                    data: [], // Os dados que você recebe do servidor
                    borderColor: 'blue',
                    fill: false
                }]
            },
            options: {
                responsive: true
            }
        });

        function updateChart() {
            $.ajax({
                url: 'https://nodemongo-sigma.vercel.app/getData',
                method: 'GET',
                dataType: 'json',
                success: function(data) {
                    chart.data.labels = data.labels;
                    chart.data.datasets[0].data = data.values;
                    chart.update();
                }
            });
        }

        // Chama a função para atualizar o gráfico a cada segundo (1000 ms)
       // Obtenha uma referência para o elemento canvas
  var ctx = document.getElementById('wind-direction-chart').getContext('2d');

  // Crie os dados iniciais para o gráfico
  var data = {
    datasets: [{
      data: [45, 30, 60, 90], // Ângulos representando a direção do vento em graus
      backgroundColor: [
        'rgba(255, 99, 132, 0.2)',
        'rgba(54, 162, 235, 0.2)',
        'rgba(255, 206, 86, 0.2)',
        'rgba(75, 192, 192, 0.2)'
      ],
      borderColor: [
        'rgba(255, 99, 132, 1)',
        'rgba(54, 162, 235, 1)',
        'rgba(255, 206, 86, 1)',
        'rgba(75, 192, 192, 1)'
      ],
      label: 'Direção do Vento'
    }],
    labels: ['Norte', 'Leste', 'Sul', 'Oeste']
  };

  // Configure as opções do gráfico polar
  var options = {
    responsive: true,
    scale: {
      ticks: {
        beginAtZero: true,
        min: 0,
        max: 360 // Ângulos em graus (0 a 360)
      }
    }
  };

  // Crie o gráfico polar
  var windDirectionChart = new Chart(ctx, {
    type: 'polarArea',
    data: data,
    options: options
  });
    </script>
</body>
</html>
