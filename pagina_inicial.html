<!DOCTYPE html>
<html>
<head>
    <title>Gráfico em Tempo Real</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <canvas id="myChart" width="400" height="200"></canvas>
    <canvas id="wind-speed-chart" width="400" height="200"></canvas>
    <script>
        var ctx = document.getElementById('myChart').getContext('2d');
        var chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [], // Rotular os pontos do gráfico (tempo, por exemplo)
                datasets: [{
                    label: 'Dados em Tempo Real',
                    data: [], // Os dados que você recebe do servidor
                    borderColor: 'blue',
                    fill: false
                }]
            },
            options: {
              scale: {


      y: {
        beginAtZero: true,
        min: 0,
        max: 30, // Altere o valor máximo conforme necessário
      }
    }
                
            }
        });

        function updateChart() {
            $.ajax({
                url: 'https://nodemongo-sigma.vercel.app/getData',
                method: 'GET',
                dataType: 'json',
                success: function(data) {
                    chart.data.labels = data.labels3;
                    chart.data.datasets[0].data = data.value3;
                    chart.update();
                }
            });
        }

        // Chama a função para atualizar o gráfico a cada segundo (1000 ms)
        setInterval(updateChart, 1000);
        var ctx = document.getElementById('wind-speed-chart').getContext('2d');

// Crie o gráfico radar com dados iniciais vazios
var windSpeedChart = new Chart(ctx, {
  type: 'radar',
  data: {
    labels: ['Norte', 'Leste', 'Sul', 'Oeste'],
    datasets: [{
      label: 'Velocidade do Vento (m/s)',
      data: [],
      backgroundColor: 'rgba(75, 192, 192, 0.2)',
      borderColor: 'rgba(75, 192, 192, 1)',
      pointBackgroundColor: 'rgba(75, 192, 192, 1)',
      pointBorderColor: '#fff',
      pointHoverBackgroundColor: '#fff',
      pointHoverBorderColor: 'rgba(75, 192, 192, 1)'
    }]
  },
  options: {
    scale: {
      angleLines: {
        display: false
      },
      ticks: {
        beginAtZero: true,
        min: 0,
        max: 30 // Altere o valor máximo conforme necessário
      }
    }
  }
});

// Função para atualizar o gráfico com dados do servidor
function updateChartWithData() {
            $.ajax({
                url: 'https://nodemongo-sigma.vercel.app/getData',
                method: 'GET',
                dataType: 'json',
                success: function(data) {
      windSpeedChart.data.datasets[0].data = data.value8;
      windSpeedChart.update();
                }
    });
}

// Atualize o gráfico com dados do servidor periodicamente (por exemplo, a cada 10 segundos)
setInterval(updateChartWithData, 10000); // 10 segundos
    </script>
</body>
</html>
