<!DOCTYPE html>
<html>
<head>
    <title>Gráfico em Tempo Real</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <canvas id="myChart" width="400" height="200"></canvas>
   <canvas id="wind-direction-chart"></canvas>
    <script>
        var ctx = document.getElementById('myChart').getContext('2d');
        var chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [], // Rotular os pontos do gráfico (tempo, por exemplo)
                datasets: [{
                    label: 'Dados em Tempo Real',
                    data: [], // Os dados que você recebe do servidor
                    borderColor: 'blue',
                    fill: false
                }]
            },
            options: {
                responsive: true
            }
        });

        function updateChart() {
            $.ajax({
                url: 'https://nodemongo-sigma.vercel.app/getData',
                method: 'GET',
                dataType: 'json',
                success: function(data) {
                    chart.data.labels = data.labels;
                    chart.data.datasets[0].data = data.values;
                    chart.update();
                }
            });
        }

        // Chama a função para atualizar o gráfico a cada segundo (1000 ms)
  var ctx = document.getElementById('wind-speed-chart').getContext('2d');

  // Crie os dados iniciais para o gráfico
  var data = {
    labels: ['Norte', 'Leste', 'Sul', 'Oeste'], // Direções do vento
    datasets: [{
      label: 'Velocidade do Vento (m/s)',
      data: [10, 15, 5, 20], // Velocidade do vento em cada direção
      backgroundColor: 'rgba(75, 192, 192, 0.2)',
      borderColor: 'rgba(75, 192, 192, 1)',
      pointBackgroundColor: 'rgba(75, 192, 192, 1)',
      pointBorderColor: '#fff',
      pointHoverBackgroundColor: '#fff',
      pointHoverBorderColor: 'rgba(75, 192, 192, 1)'
    }]
  };

  // Configure as opções do gráfico radar
  var options = {
    scale: {
      angleLines: {
        display: false
      },
      ticks: {
        beginAtZero: true,
        min: 0,
        max: 30 // Altere o valor máximo conforme necessário
      }
    }
  };

  // Crie o gráfico radar
  var windSpeedChart = new Chart(ctx, {
    type: 'radar',
    data: data,
    options: options
  });
    </script>
</body>
</html>
